<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sprint4.css">
    <title>Ad Schedule</title>
</head>
<body>
    <header>
        <div class="wrap">
            <img src="P48_Logo.png" alt="P48 Logo" id="logo">
        </div>
    </header>

    <div class="wrap">
        <h2>Schedule/Bill for Advertisement</h2>

        <div id="btn-bar">
            <button id="btn-new-schedule">+ New Schedule</button>
        </div>

        <section id="schedules-container"></section>
    </div>

    <div id="campaign-total-bar">
        <div class="wrap bar-inner">
            <span>Total Campaign Cost</span>
            <span id="campaign-total">$0.00</span>
        </div>
    </div>

    <footer>
        <div class="wrap">
        </div>
    </footer>

    <script src="sprint4.js"></script>
</body>
</html>
